<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pacotes | Admin Multiversal TCG</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <p class="eyebrow">Admin</p>
            <h1>Pacotes</h1>
        </div>
        <nav class="nav-actions" aria-label="Admin">
            <a class="button secondary" href="/admin.html">Biblioteca</a>
            <a class="button secondary" href="/admin-card.html">Nova carta</a>
            <a class="button secondary" href="/admin-packs.html">Pacotes</a>
            <a class="button" href="/admin-pack.html">Novo pacote</a>
        </nav>
    </header>

    <main class="container">
        <section class="panel" aria-labelledby="packsTitle">
            <div class="section-title">
                <div>
                    <p class="eyebrow">Pacotes</p>
                    <h2 id="packsTitle">Gerenciar pacotes</h2>
                </div>
                <span class="badge" id="packsCount">0 pacotes</span>
            </div>

            <div class="filters compact">
                <label>
                    Buscar
                    <input id="searchPacks" placeholder="Nome, ID ou descricao">
                </label>
                <label>
                    Status
                    <select id="filterStatus">
                        <option value="">Todos</option>
                        <option value="active">Ativos</option>
                        <option value="inactive">Inativos</option>
                    </select>
                </label>
            </div>

            <div id="packsList" class="cards-grid">
                <p class="loading">Carregando pacotes...</p>
            </div>
        </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/js/admin/packs-list.js"></script>
</body>
</html>
