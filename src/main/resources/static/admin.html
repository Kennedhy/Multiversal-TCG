<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin de Cartas | Multiversal TCG</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <p class="eyebrow">Admin</p>
            <h1>Biblioteca de cartas</h1>
        </div>
        <nav class="nav-actions" aria-label="Admin">
            <a class="button secondary" href="/admin.html">Biblioteca</a>
            <a class="button" href="/admin-card.html">Nova carta</a>
            <a class="button secondary" href="/admin-packs.html">Pacotes</a>
        </nav>
    </header>

    <main class="container">
        <section class="panel" aria-labelledby="cardsTitle">
            <div class="section-title">
                <div>
                    <p class="eyebrow">Cartas</p>
                    <h2 id="cardsTitle">Gerenciar cartas</h2>
                </div>
                <span class="badge" id="cardsCount">0 cartas</span>
            </div>

            <div class="filters">
                <label>
                    Buscar
                    <input id="searchCards" placeholder="Nome, ID, tipo ou universo">
                </label>
                <label>
                    Tipo
                    <select id="filterType"></select>
                </label>
                <label>
                    Raridade
                    <select id="filterRarity"></select>
                </label>
                <label>
                    Origem
                    <select id="filterSource">
                        <option value="">Todas</option>
                        <option value="BASE">Base</option>
                        <option value="CUSTOM">Custom</option>
                    </select>
                </label>
                <label>
                    Status
                    <select id="filterStatus">
                        <option value="">Todas</option>
                        <option value="active">Ativas</option>
                        <option value="inactive">Inativas</option>
                    </select>
                </label>
            </div>

            <div id="cardsList" class="cards-grid">
                <p class="loading">Carregando cartas...</p>
            </div>
        </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/js/admin/cards-list.js"></script>
</body>
</html>
