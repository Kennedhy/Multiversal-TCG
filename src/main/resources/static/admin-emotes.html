<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Emotes | Admin Multiversal TCG</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <p class="eyebrow">Admin</p>
            <h1>Emotes PvP</h1>
        </div>
        <nav class="nav-actions" aria-label="Admin">
            <a class="button secondary" href="/admin.html">Biblioteca</a>
            <a class="button secondary" href="/admin-card.html">Nova carta</a>
            <a class="button secondary" href="/admin-packs.html">Pacotes</a>
            <a class="button" href="/admin-emotes.html">Emotes</a>
        </nav>
    </header>

    <main class="container">
        <section class="panel" aria-labelledby="newEmoteTitle">
            <div class="section-title">
                <div>
                    <p class="eyebrow">Novo</p>
                    <h2 id="newEmoteTitle">Adicionar emote</h2>
                </div>
            </div>

            <form id="emoteForm" class="grid three">
                <label>
                    Nome
                    <input id="newEmoteName" maxlength="120" placeholder="Ex: Risada">
                </label>
                <label>
                    URL do GIF
                    <input id="newEmoteGifUrl" maxlength="500" placeholder="/uploads/emotes/laugh.gif">
                </label>
                <label>
                    Arquivo GIF
                    <input id="newEmoteFile" type="file" accept="image/gif">
                </label>
                <div class="actions">
                    <button type="submit">Adicionar emote</button>
                </div>
            </form>
        </section>

        <section class="panel" aria-labelledby="emotesTitle">
            <div class="section-title">
                <div>
                    <p class="eyebrow">GIFs</p>
                    <h2 id="emotesTitle">Personalizar emotes</h2>
                </div>
                <span class="badge" id="emotesCount">0 emotes</span>
            </div>

            <div id="emotesList" class="cards-grid">
                <p class="loading">Carregando emotes...</p>
            </div>
        </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/js/admin/emotes.js?v=20260603-4"></script>
</body>
</html>
